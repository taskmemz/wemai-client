[connection]
# wemai-adapter 插件 WebSocket 服务器地址
server_host = "localhost"
server_port = 9721
# 连接断开后重试间隔（秒）
reconnect_delay = 5

[wechat]
# 监听目标聊天（独立窗口模式，不会滚动会话列表）
# 留空 = 自动从微信读取当前所有会话并全部监听
target_chats = []
# 排除的聊天对象
excluded = ["文件传输助手", "微信团队", "微信支付"]
# 发送单条消息延迟（秒）
send_delay = 0.2
# 退出时是否关闭微信
close_weixin = false

[log]
level = "INFO"
file = "wemai-client.log"
format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
